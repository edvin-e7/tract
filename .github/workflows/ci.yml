name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Go (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      # Pure-Go SQLite (modernc) → no CGO, no system libs needed.
      - name: go test
        run: go test ./... -race -count=1

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Deterministic anti-slop gate: rejects hover-lift, AI-default gradients,
      # and un-tokenized shadows before the build even runs.
      - run: npm run lint:css
      # `npm run build` is `tsc -b && vite build` → typecheck gates the build.
      - run: npm run build
